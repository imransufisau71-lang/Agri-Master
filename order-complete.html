<!DOCTYPE html>
<html lang="bn">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">

  <meta charset="UTF-8">
  <title>অর্ডার সম্পন্ন</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Bangla:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Tiro Bangla', serif;
    }

    body {
      background: linear-gradient(135deg, #e8f4fc, #d0ebf8);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: #fff;
      border-radius: 4px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .success {
      text-align: center;
      margin-bottom: 20px;
    }

    .success-icon {
      font-size: 50px;
      color: #2e8b3c;
    }

    .success h2 {
      margin-top: 10px;
      color: #0d2040;
    }

    .box {
      background: #fafafa;
      border-radius: 3px;
      padding: 15px;
      margin-top: 15px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 14px;
    }

    .label {
      color: #5ab4e5;
    }

    .value {
      font-weight: 600;
      color: #0d2040;
    }

    h3 {
      margin-top: 20px;
      font-size: 16px;
      color: #1a3a6b;
    }

    .customer {
      margin-top: 10px;
      line-height: 1.6;
      font-size: 14px;
      color: #0d2040;
    }

    .btn {
      margin-top: 20px;
      display: block;
      width: 100%;
      text-align: center;
      background: #2e8b3c;
      color: white;
      padding: 12px;
      border-radius: 3px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
    }

    .btn:hover {
      background: #e8b000;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="success">
    <div class="success-icon">✔</div>
    <h2>অর্ডার সফল হয়েছে!</h2>
    <p>আপনার অর্ডার গ্রহণ করা হয়েছে</p>
  </div>

  <div class="box">
    <div class="row">
      <span class="label">অর্ডার আইডি</span>
      <span class="value" id="orderId"></span>
    </div>
    <div class="row">
      <span class="label">তারিখ</span>
      <span class="value" id="date"></span>
    </div>
    <div class="row">
      <span class="label">মোট</span>
      <span class="value" id="total"></span>
    </div>
    <div class="row">
      <span class="label">পেমেন্ট</span>
      <span class="value">ক্যাশ অন ডেলিভারি</span>
    </div>
  </div>

  <h3>গ্রাহকের তথ্য</h3>
  <div class="customer" id="customer"></div>

  <a href="/" class="btn">হোমে ফিরে যান</a>

</div>

<script>
  const data = JSON.parse(localStorage.getItem("lastOrder"));

  if (data) {
    document.getElementById("orderId").textContent = data.orderId;
    document.getElementById("date").textContent = new Date().toLocaleDateString("bn-BD");
    document.getElementById("total").textContent = "৳" + data.total;

    document.getElementById("customer").innerHTML = `
      ${data.customer.name}<br>
      ${data.customer.phone}<br>
      ${data.customer.address}<br>
      ${data.customer.upazila}, ${data.customer.district}
    `;
  }
</script>

</body>
</html><!-- color/font patch applied below -->
